{% extends 'base.html' %}
{% load static %}
{% block title %}Asignacion masiva - Licencias{% endblock %}

{% block content %}
<style>
    .lic-shell { display: flex; flex-direction: column; gap: 1rem; }
    .lic-module-nav { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-bottom: 0.5rem; }
    .lic-module-link { background: #fffdf9; border: 1px solid rgba(223, 110, 18, 0.18); border-radius: 8px; color: #6d7480; display: inline-flex; align-items: center; gap: 0.45rem; font-size: 0.92rem; font-weight: 700; padding: 0.7rem 1rem; text-decoration: none; transition: all 0.18s ease; }
    .lic-module-link:hover { background: #fff6ed; border-color: rgba(223, 110, 18, 0.34); color: #b65a11; }
    .lic-module-link.active { background: linear-gradient(180deg, #ef882d 0%, #df6e12 100%); border-color: #df6e12; box-shadow: 0 10px 22px rgba(223, 110, 18, 0.18); color: #fff; }
    .mass-card { background: #fff; border: 1px solid rgba(220, 197, 177, 0.45); border-radius: 10px; box-shadow: 0 10px 24px rgba(35,45,60,.05); padding: 1rem; }
</style>
<link rel="stylesheet" href="{% static 'licencias/css/modulo.css' %}">

<div class="lic-shell">
    <div class="page-header mb-0">
        <h2 class="page-title">
            <span class="page-title-icon"><i class="fa-solid fa-layer-group"></i></span>
            <span class="page-title-text">Asignacion masiva</span>
        </h2>
        <div class="page-actions">
            <a href="{% url 'asignaciones_licencias' %}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i>Volver
            </a>
        </div>
    </div>

    <div class="lic-module-nav">
        <a href="{% url 'gestionar_licencias' %}" class="lic-module-link">
            <i class="fa-solid fa-table-list"></i><span>Gestionar Licencias</span>
        </a>
        <a href="{% url 'catalogo_licencias' %}" class="lic-module-link">
            <i class="fa-solid fa-truck-fast"></i><span>Gestionar Proveedores</span>
        </a>
        <a href="{% url 'asignaciones_licencias' %}" class="lic-module-link active">
            <i class="fa-solid fa-user-check"></i><span>Gestionar Asignaciones</span>
        </a>
    </div>

    <form method="get" class="mass-card" data-mass-filter>
        <div class="row g-3 align-items-end">
            <div class="col-12 col-lg-6">
                <label class="form-label small fw-bold text-secondary">TENANT</label>
                <select name="tenant" class="form-select">
                    <option value="">Todos</option>
                    {% for tenant in tenants %}
                    {% with tenant_id=tenant.id|stringformat:"s" %}
                    <option value="{{ tenant.id }}" {% if tenant_filtro == tenant_id %}selected{% endif %}>{{ tenant.nombre }}</option>
                    {% endwith %}
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 col-lg-6">
                <label class="form-label small fw-bold text-secondary">EMPRESA</label>
                <select name="empresa" class="form-select">
                    <option value="">Selecciona empresa</option>
                    {% for empresa in empresas %}
                    {% with empresa_id=empresa.id|stringformat:"s" %}
                    <option value="{{ empresa.id }}" {% if empresa_filtro == empresa_id %}selected{% endif %}>{{ empresa.nombre }}</option>
                    {% endwith %}
                    {% endfor %}
                </select>
            </div>
        </div>
    </form>

    <div class="mass-card">
        <form method="post" action="{% url 'asignar_licencias_masivo' %}">
            {% csrf_token %}
            <input type="hidden" name="empresa_id" value="{{ empresa_filtro }}">
            <div class="row g-3">
                <div class="col-12 col-lg-5">
                    <label class="form-label small fw-bold text-secondary">LICENCIA DISPONIBLE</label>
                    <select name="tipo_id" class="form-select" required {% if not empresa_filtro %}disabled{% endif %}>
                        <option value="">Selecciona licencia</option>
                        {% for tipo in tipos_disponibles %}
                        <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-lg-7">
                    <label class="form-label small fw-bold text-secondary">EMPLEADOS</label>
                    <select name="empleado_ids" class="form-select" multiple size="10" required {% if not empresa_filtro %}disabled{% endif %}>
                        {% for empleado in empleados %}
                        <option value="{{ empleado.id }}">{{ empleado.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-3">
                <a href="{% url 'asignaciones_licencias' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary" {% if not empresa_filtro %}disabled{% endif %}>
                    <i class="fa-solid fa-check me-1"></i>Asignar seleccionados
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('[data-mass-filter]');
        if (!form) return;
        form.querySelectorAll('select').forEach((select) => {
            select.addEventListener('change', () => form.submit());
        });
    });
</script>
{% endblock %}
