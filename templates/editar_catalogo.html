{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container-fluid max-w-7xl mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 style="color: #333; font-weight: bold;">
            <i class="fa-solid fa-pen-to-square me-2"></i> {{ titulo }}
        </h3>
        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm" title="Volver a la pantalla anterior">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    {% for field in form %}
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1 fw-bold">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                </div>
                
                <hr class="text-muted opacity-25 my-4">
                
                <div class="d-flex justify-content-end">
                    <a href="javascript:history.back()" class="btn btn-light border me-2 px-4">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function() {
        // Activar buscador en los campos de selección
        $('.select2-busqueda').select2({ 
            theme: 'bootstrap-5', 
            width: '100%' 
        });
    });
</script>
{% endblock %}
