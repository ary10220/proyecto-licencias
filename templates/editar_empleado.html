{% extends 'base.html' %}

{% block title %}Editar Empleado{% endblock %}

{% block content %}
<style>
    .employee-edit-shell {
        display: flex;
        justify-content: center;
    }

    .employee-edit-card {
        max-width: 1040px;
        width: 100%;
    }

    .employee-edit-body {
        background: linear-gradient(180deg, #fff8f2 0%, #fffdf9 100%);
    }

    .employee-edit-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: flex-end;
    }

    @media (max-width: 767.98px) {
        .employee-edit-actions > * {
            flex: 1 1 100%;
        }
    }
</style>

<div class="employee-edit-shell">
    <div class="employee-edit-card">
        <div class="page-header mb-3">
            <h2 class="page-title mb-0"><span class="page-title-icon"><i class="fa-solid fa-user-pen"></i></span><span class="page-title-text page-title-accent">{{ titulo }}</span></h2>
            <div class="page-actions">
                <a href="{% url 'lista_empleados' %}" class="btn btn-outline-primary"><i class="fa-solid fa-arrow-left me-1"></i>Volver al Directorio</a>
            </div>
        </div>

        <div class="card shadow-sm border-0 content-card">
            <div class="card-body p-4 employee-edit-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        {% for field in form %}
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary small">{{ field.label|upper }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1 fw-bold">{{ field.errors|striptags }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                    </div>

                    <hr class="mt-4 mb-3">
                    <div class="employee-edit-actions mt-4">
                        <a href="javascript:history.back()" class="btn btn-light border px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function(){
        $('.select2-busqueda').select2({ theme: 'bootstrap-5', width: '100%' });

        $("#id_empresa").change(function () {
            var url_areas = "{% url 'ajax_cargar_areas' %}";
            $.ajax({
                url: url_areas,
                data: { 'empresa_id': $(this).val() },
                success: function (data) {
                    $("#id_area").html('<option value="">---------</option>');
                    $("#id_unidad").html('<option value="">---------</option>');
                    $.each(data, function(index, area) {
                        $("#id_area").append('<option value="' + area.id + '">' + area.texto + '</option>');
                    });
                }
            });
        });

        $("#id_area").change(function () {
            var url_unidades = "{% url 'ajax_cargar_unidades' %}";
            $.ajax({
                url: url_unidades,
                data: { 'area_id': $(this).val() },
                success: function (data) {
                    $("#id_unidad").html('<option value="">---------</option>');
                    $.each(data, function(index, unidad) {
                        $("#id_unidad").append('<option value="' + unidad.id + '">' + unidad.nombre + '</option>');
                    });
                }
            });
        });
    });
</script>
{% endblock %}
