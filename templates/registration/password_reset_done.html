{% extends "base.html" %}
{% block title %}Correo Enviado{% endblock %}

{% block content %}
<style>
    .sidebar {
        display: none !important;
    }
    .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f6f9;
    }
</style>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card p-4 shadow text-center" style="width: 100%; max-width: 450px;">
        <i class="fa-solid fa-paper-plane fa-3x mb-3" style="color: var(--color-principal);"></i>
        <h3 class="mb-3">¡Correo enviado!</h3>
        <p class="text-muted">
            Te hemos enviado un correo electrónico con instrucciones para restablecer tu contraseña. 
            Si no lo recibes en unos minutos, revisa tu carpeta de <strong>spam</strong>.
        </p>
        <div class="mt-3">
            <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100">Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
