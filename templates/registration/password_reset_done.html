{% extends "base.html" %}
{% block title %}Correo Enviado{% endblock %}

{% block content %}
<style>
    .sidebar,
    .mobile-topbar,
    .sidebar-backdrop { display: none !important; }
    .main-content {
        align-items: center;
        background: radial-gradient(circle at top left, rgba(255, 206, 160, 0.28), transparent 34%), linear-gradient(180deg, #fbf7f1 0%, #f6f1eb 100%);
        display: flex;
        justify-content: center;
        margin-left: 0 !important;
        min-height: 100dvh;
        padding: 24px 16px !important;
        width: 100% !important;
    }
    .auth-shell { width: min(100%, 450px); }
    .auth-card {
        background: #fffdf9;
        border: 1px solid rgba(220, 197, 177, 0.72);
        border-radius: 18px;
        box-shadow: 0 24px 54px rgba(85, 42, 10, 0.14);
        padding: 24px;
        text-align: center;
    }
    .auth-icon {
        align-items: center;
        background: linear-gradient(135deg, #ef7d1f 0%, #d76510 100%);
        border-radius: 14px;
        color: #ffffff;
        display: inline-flex;
        height: 64px;
        justify-content: center;
        width: 64px;
    }
    .auth-card h1 { font-size: 1.42rem; font-weight: 800; margin: 1rem 0 0.7rem; }
    @media (max-width: 575.98px) {
        .main-content { padding: 14px !important; }
        .auth-card { padding: 20px 18px; }
        .auth-card h1 { font-size: 1.24rem; }
    }
</style>
<div class="auth-shell">
    <div class="auth-card">
        <span class="auth-icon"><i class="fa-solid fa-paper-plane fa-lg"></i></span>
        <h1>Correo enviado</h1>
        <p class="text-muted mb-0">
            Te enviamos un correo con instrucciones para restablecer tu contrasena. Si no lo recibes en unos minutos, revisa tu carpeta de <strong>spam</strong>.
        </p>
        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100">Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
