<form method="post" id="forcePasswordChangeForm" action="{% url 'password_change' %}" novalidate>
    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label small fw-bold">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <div class="form-text" style="font-size: 0.75rem;">{{ field.help_text }}</div>
            {% endif %}
            {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
            {% endfor %}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary w-100" id="btnForcePasswordChange">
        Confirmar cambio
    </button>
</form>

<style>
    #forcePasswordChangeForm input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
    }
</style>
