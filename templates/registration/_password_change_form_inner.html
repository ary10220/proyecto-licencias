<form method="post" id="forcePasswordChangeForm" class="auth-form" action="{% url 'password_change' %}" novalidate>
    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label small fw-bold">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <div class="form-text auth-help">{{ field.help_text }}</div>
            {% endif %}
            {% for error in field.errors %}
                <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary auth-primary w-100" id="btnForcePasswordChange">
        Confirmar cambio
    </button>
</form>

<style>
    #forcePasswordChangeForm input {
        border: 1px solid rgba(220, 197, 177, 0.84);
        border-radius: 10px;
        display: block;
        font-size: 1rem;
        min-height: 48px;
        padding: 0.65rem 0.85rem;
        width: 100%;
    }

    #forcePasswordChangeForm input:focus {
        border-color: rgba(223, 110, 18, 0.45);
        box-shadow: 0 0 0 0.24rem rgba(223, 110, 18, 0.16);
        outline: none;
    }

    #forcePasswordChangeForm .auth-help,
    #forcePasswordChangeForm .form-text {
        font-size: 0.77rem;
    }

    #forcePasswordChangeForm .auth-primary {
        background: linear-gradient(135deg, #df6e12 0%, #b9550c 100%);
        border: none;
        border-radius: 10px;
        font-weight: 800;
        min-height: 48px;
    }
</style>
