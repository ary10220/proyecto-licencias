{% extends "base.html" %}
{% block title %}Contrasena Actualizada{% endblock %}

{% block content %}
<style>
    .sidebar,
    .mobile-topbar,
    .sidebar-backdrop { display: none !important; }
    .main-content {
        align-items: center;
        background: radial-gradient(circle at top left, rgba(255, 206, 160, 0.28), transparent 34%), linear-gradient(180deg, #fbf7f1 0%, #f6f1eb 100%);
        display: flex;
        justify-content: center;
        margin-left: 0 !important;
        min-height: 100dvh;
        padding: 24px 16px !important;
        width: 100% !important;
    }
    .auth-shell { width: min(100%, 440px); }
    .auth-card {
        background: #fffdf9;
        border: 1px solid rgba(220, 197, 177, 0.72);
        border-radius: 18px;
        box-shadow: 0 24px 54px rgba(85, 42, 10, 0.14);
        padding: 24px;
        text-align: center;
    }
    .auth-icon {
        align-items: center;
        background: linear-gradient(135deg, #26a65b 0%, #1f8b4d 100%);
        border-radius: 14px;
        color: #ffffff;
        display: inline-flex;
        height: 64px;
        justify-content: center;
        width: 64px;
    }
    .auth-primary {
        background: linear-gradient(135deg, #df6e12 0%, #b9550c 100%);
        border: none;
        border-radius: 10px;
        font-weight: 800;
        min-height: 48px;
    }
    .auth-card h1 { font-size: 1.38rem; font-weight: 800; margin: 1rem 0 0.55rem; }
    @media (max-width: 575.98px) {
        .main-content { padding: 14px !important; }
        .auth-card { padding: 20px 18px; }
        .auth-card h1 { font-size: 1.2rem; }
    }
</style>
<div class="auth-shell">
    <div class="auth-card">
        <span class="auth-icon"><i class="fa-solid fa-circle-check fa-lg"></i></span>
        <h1>Contrasena actualizada</h1>
        <p class="text-muted mb-0">Ya puedes continuar usando el sistema.</p>
        <div class="mt-4">
            <a href="{% url 'home' %}" class="btn btn-primary auth-primary w-100">Continuar</a>
        </div>
    </div>
</div>
{% endblock %}
