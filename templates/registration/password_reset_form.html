{% extends "base.html" %}
{% block title %}Recuperar Contrasena{% endblock %}

{% block content %}
<style>
    .sidebar,
    .mobile-topbar,
    .sidebar-backdrop { display: none !important; }

    .main-content {
        align-items: center;
        background:
            radial-gradient(circle at top left, rgba(255, 206, 160, 0.28), transparent 34%),
            linear-gradient(180deg, #fbf7f1 0%, #f6f1eb 100%);
        display: flex;
        justify-content: center;
        margin-left: 0 !important;
        min-height: 100dvh;
        padding: 24px 16px !important;
        width: 100% !important;
    }

    .auth-shell { width: min(100%, 440px); }
    .auth-card {
        background: #fffdf9;
        border: 1px solid rgba(220, 197, 177, 0.72);
        border-radius: 18px;
        box-shadow: 0 24px 54px rgba(85, 42, 10, 0.14);
        padding: 24px;
    }

    .auth-icon {
        align-items: center;
        background: linear-gradient(135deg, #ef7d1f 0%, #d76510 100%);
        border-radius: 14px;
        color: #ffffff;
        display: inline-flex;
        height: 64px;
        justify-content: center;
        width: 64px;
    }

    .auth-card h1 {
        color: #252b36;
        font-size: 1.45rem;
        font-weight: 800;
        margin: 1rem 0 0.5rem;
    }

    .auth-card p { color: #6c7480; }

    .auth-form label {
        color: #5f6875;
        display: block;
        font-size: 0.82rem;
        font-weight: 800;
        margin-bottom: 0.45rem;
        text-transform: uppercase;
    }

    .auth-form input {
        border: 1px solid rgba(220, 197, 177, 0.84);
        border-radius: 10px;
        min-height: 48px;
        width: 100%;
    }

    .auth-form input:focus {
        border-color: rgba(223, 110, 18, 0.45);
        box-shadow: 0 0 0 0.24rem rgba(223, 110, 18, 0.16);
        outline: none;
    }

    .auth-primary {
        background: linear-gradient(135deg, #df6e12 0%, #b9550c 100%);
        border: none;
        border-radius: 10px;
        font-weight: 800;
        min-height: 48px;
    }

    .auth-link {
        color: #df6e12;
        font-weight: 700;
        text-decoration: none;
    }

    @media (max-width: 575.98px) {
        .main-content { padding: 14px !important; }
        .auth-card { padding: 20px 18px; }
        .auth-card h1 { font-size: 1.28rem; }
        .auth-icon { height: 58px; width: 58px; }
    }
</style>
<div class="auth-shell">
    <div class="auth-card">
        <div class="text-center mb-4">
            <span class="auth-icon"><i class="fa-solid fa-key fa-lg"></i></span>
            <h1>Olvidaste tu clave?</h1>
            <p class="small mb-0">Ingresa tu correo y te enviaremos un enlace para restaurarla.</p>
        </div>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.email.label_tag }}
                <input type="email" name="email" class="form-control" required placeholder="ejemplo@uagrm.edu.bo">
            </div>
            <button type="submit" class="btn btn-primary auth-primary w-100">Enviar enlace</button>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="auth-link small">Volver al inicio</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
