{% extends "base.html" %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<style>
    .sidebar { 
        display: none !important; 
    }
    .main-content { 
        margin-left: 0 !important; 
        padding: 0 !important;
        width: 100% !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f6f9; /* Color gris de fondo para que resalte el card */
    }
</style>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <i class="fa-solid fa-key fa-3x" style="color: var(--color-principal);"></i>
            <h3 class="mt-3">¿Olvidaste tu clave?</h3>
            <p class="text-muted small">Ingresa tu correo y te enviaremos un enlace para restaurarla.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.email.label_tag }}
                <input type="email" name="email" class="form-control" required placeholder="ejemplo@uagrm.edu.bo">
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-decoration-none small" style="color: var(--color-principal);">Volver al inicio</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
