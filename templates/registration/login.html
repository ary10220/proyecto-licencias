<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Gestion Licencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --auth-bg: #f6f1eb;
            --auth-surface: #fffdf9;
            --auth-surface-soft: #fff8f2;
            --auth-border: rgba(220, 197, 177, 0.72);
            --auth-shadow: 0 24px 54px rgba(85, 42, 10, 0.14);
            --brand: #df6e12;
            --brand-dark: #b9550c;
            --text-main: #252b36;
            --text-muted: #6c7480;
        }

        * { box-sizing: border-box; }

        body {
            align-items: center;
            background:
                radial-gradient(circle at top left, rgba(255, 206, 160, 0.28), transparent 34%),
                linear-gradient(180deg, #fbf7f1 0%, var(--auth-bg) 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100dvh;
            padding: 24px 16px;
        }

        .auth-shell {
            width: min(100%, 430px);
        }

        .auth-card {
            background: var(--auth-surface);
            border: 1px solid var(--auth-border);
            border-radius: 18px;
            box-shadow: var(--auth-shadow);
            overflow: hidden;
        }

        .auth-card-header {
            background: linear-gradient(135deg, #ef7d1f 0%, #d76510 62%, #a94b0b 100%);
            color: #ffffff;
            padding: 26px 24px 22px;
            position: relative;
            text-align: center;
        }

        .auth-card-header::after {
            background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 100%);
            content: "";
            inset: 0;
            pointer-events: none;
            position: absolute;
        }

        .auth-brand {
            align-items: center;
            display: inline-flex;
            gap: 0.7rem;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .auth-brand-icon {
            align-items: center;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 12px;
            display: inline-flex;
            height: 44px;
            justify-content: center;
            width: 44px;
        }

        .auth-brand h1 {
            font-size: 1.42rem;
            font-weight: 800;
            margin: 0;
        }

        .auth-brand p {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin: 0.12rem 0 0;
            opacity: 0.85;
            text-transform: uppercase;
        }

        .auth-card-body {
            padding: 24px;
        }

        .auth-label {
            color: var(--text-muted);
            display: block;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            margin-bottom: 0.48rem;
            text-transform: uppercase;
        }

        .input-group-text,
        .form-control {
            border-color: var(--auth-border);
            min-height: 48px;
        }

        .input-group-text {
            background: var(--auth-surface-soft);
            color: #7c8794;
        }

        .form-control {
            background: #ffffff;
        }

        .form-control:focus {
            border-color: rgba(223, 110, 18, 0.45);
            box-shadow: 0 0 0 0.24rem rgba(223, 110, 18, 0.16);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 800;
            min-height: 48px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-login:hover {
            box-shadow: 0 12px 24px rgba(185, 85, 12, 0.2);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .auth-link {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
        }

        .auth-link:hover { color: var(--brand-dark); }

        .auth-card-footer {
            background: var(--auth-surface-soft);
            border-top: 1px solid rgba(220, 197, 177, 0.5);
            color: var(--text-muted);
            font-size: 0.82rem;
            padding: 16px 24px 18px;
            text-align: center;
        }

        @media (max-width: 575.98px) {
            body {
                align-items: stretch;
                padding: 14px;
            }

            .auth-shell {
                width: 100%;
            }

            .auth-card-header,
            .auth-card-body,
            .auth-card-footer {
                padding-left: 18px;
                padding-right: 18px;
            }

            .auth-card-header {
                padding-top: 22px;
                padding-bottom: 18px;
            }

            .auth-brand h1 {
                font-size: 1.24rem;
            }

            .auth-brand p {
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-brand">
                    <span class="auth-brand-icon"><i class="fa-brands fa-microsoft"></i></span>
                    <div>
                        <h1>Licencias 365</h1>
                        <p>Acceso seguro</p>
                    </div>
                </div>
            </div>

            <div class="auth-card-body">
                {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center small mb-3">
                        <i class="fa-solid fa-circle-exclamation me-1"></i> Usuario o contrasena incorrectos.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="auth-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="auth-label">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Ingresa tu contrasena" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-login">Ingresar</button>
                    </div>

                    <div class="text-center mt-3">
                        <a href="{% url 'reset_password' %}" class="auth-link">Olvidaste tu contrasena?</a>
                    </div>
                </form>
            </div>

            <div class="auth-card-footer">
                <small>&copy; 2026 Gestion TI</small>
            </div>
        </div>
    </main>
</body>
</html>
