<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestión Licencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            width: 100%;
            max-width: 400px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .card-header {
            background-color: #df6e12; /* TU NARANJA */
            color: white;
            text-align: center;
            padding: 20px;
            border: none;
        }
        .btn-login {
            background-color: #df6e12;
            border: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #c05b0e;
            color: white;
        }
        .form-control:focus {
            border-color: #df6e12;
            box-shadow: 0 0 0 0.25rem rgba(223, 110, 18, 0.25);
        }
    </style>
</head>
<body>

    <div class="card card-login">
        <div class="card-header">
            <h3><i class="fa-brands fa-microsoft me-2"></i>Licencias 365</h3>
            <p class="mb-0 small opacity-75">Acceso Seguro</p>
        </div>
        <div class="card-body p-4">
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 text-center small mb-3">
                    <i class="fa-solid fa-circle-exclamation me-1"></i> Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">USUARIO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-user text-secondary"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-secondary"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-login py-2">INGRESAR</button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center bg-light py-3 border-0">
            <small class="text-muted">&copy; 2026 Gestión TI</small>
        </div>
    </div>

</body>
</html>
