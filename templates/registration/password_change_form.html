{% extends "base.html" %}
{% block title %}Cambiar Contrasena{% endblock %}

{% block content %}
<style>
    .sidebar,
    .mobile-topbar,
    .sidebar-backdrop { display: none !important; }

    .main-content {
        align-items: center;
        background: radial-gradient(circle at top left, rgba(255, 206, 160, 0.28), transparent 34%), linear-gradient(180deg, #fbf7f1 0%, #f6f1eb 100%);
        display: flex;
        justify-content: center;
        margin-left: 0 !important;
        min-height: 100dvh;
        padding: 24px 16px !important;
        width: 100% !important;
    }

    .auth-shell { width: min(100%, 520px); }
    .auth-card {
        background: #fffdf9;
        border: 1px solid rgba(220, 197, 177, 0.72);
        border-radius: 18px;
        box-shadow: 0 24px 54px rgba(85, 42, 10, 0.14);
        padding: 24px;
    }

    .auth-icon {
        align-items: center;
        background: linear-gradient(135deg, #ef7d1f 0%, #d76510 100%);
        border-radius: 14px;
        color: #ffffff;
        display: inline-flex;
        height: 64px;
        justify-content: center;
        width: 64px;
    }

    .auth-card h1 {
        color: #252b36;
        font-size: 1.42rem;
        font-weight: 800;
        margin: 1rem 0 0.45rem;
    }

    @media (max-width: 575.98px) {
        .main-content { padding: 14px !important; }
        .auth-card { padding: 20px 18px; }
        .auth-card h1 { font-size: 1.22rem; }
    }
</style>
<div class="auth-shell">
    <div class="auth-card">
        <div class="text-center mb-4">
            <span class="auth-icon"><i class="fa-solid fa-shield-halved fa-lg"></i></span>
            <h1>Cambia tu contrasena</h1>
            <p class="text-muted small mb-0">Por seguridad, debes definir una contrasena nueva antes de continuar.</p>
        </div>

        {% include "registration/_password_change_form_inner.html" %}
    </div>
</div>
{% endblock %}
